# Alembic configuration file for TrustLens.
# alembic/env.py reads the database URL from Settings (pydantic-settings)
# rather than from this file so the URL is never committed.

[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .

# Do NOT put the real URL here — it is injected in env.py from Settings.
sqlalchemy.url = postgresql+psycopg2://placeholder:placeholder@localhost/trustlens

[post_write_hooks]
# Run ruff on generated migration files automatically
hooks = ruff
ruff.type = exec
ruff.executable = %(here)s/venv/bin/ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
