name: trustlens
description: "TrustLens — Know what you consume."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # HTTP
  dio: ^5.7.0

  # Auth
  firebase_auth: ^5.5.1
  firebase_core: ^3.12.1
  google_sign_in: ^6.2.2

  # Local storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # Camera & images
  image_picker: ^1.1.2

  # Fonts
  google_fonts: ^6.2.1

  # Icons
  lucide_icons: ^0.257.0

  # Image caching
  cached_network_image: ^3.4.1

  # Animations
  flutter_animate: ^4.5.2

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
